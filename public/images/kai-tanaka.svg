<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Digital ceramic forms -->
  <g opacity="0.2" fill="#fff">
    <ellipse cx="400" cy="300" rx="180" ry="220"/>
  </g>
  <g opacity="0.15" fill="none" stroke="#fff" stroke-width="1.5">
    <ellipse cx="400" cy="300" rx="140" ry="180"/>
    <ellipse cx="400" cy="300" rx="100" ry="140"/>
    <ellipse cx="400" cy="300" rx="60" ry="100"/>
    <ellipse cx="400" cy="300" rx="20" ry="60"/>
  </g>
  <!-- Kintsugi gold cracks -->
  <g stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.6">
    <path d="M320 180 Q360 220 340 280 Q320 340 360 400"/>
    <path d="M340 280 Q380 270 420 300"/>
    <path d="M420 300 Q460 340 440 420 Q430 460 470 500"/>
    <path d="M360 400 Q400 410 440 420"/>
  </g>
  <!-- Geometric facets -->
  <polygon points="200,100 280,60 300,150" fill="#fff" opacity="0.08"/>
  <polygon points="520,80 620,120 580,200" fill="#fff" opacity="0.08"/>
  <polygon points="150,380 220,440 160,500" fill="#fff" opacity="0.06"/>
  <polygon points="600,400 680,360 700,460" fill="#fff" opacity="0.06"/>
</svg>
