  <rect x="540" y="140" width="400" height="440" rx="2" fill="#fff" stroke="#b8a89a" stroke-width="2"/>
  <rect x="560" y="160" width="360" height="400" fill="url(#g2)" opacity="0.85"/>
  <rect x="620" y="220" width="120" height="120" fill="#fff" opacity="0.15" transform="rotate(15 680 280)"/>
