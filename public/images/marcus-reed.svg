<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Industrial/urban Detroit photography feel -->
  <!-- Building silhouettes -->
  <rect x="50" y="200" width="120" height="400" fill="#1a1a1a" opacity="0.2"/>
  <rect x="190" y="280" width="80" height="320" fill="#1a1a1a" opacity="0.15"/>
  <rect x="300" y="150" width="150" height="450" fill="#1a1a1a" opacity="0.18"/>
  <rect x="500" y="250" width="100" height="350" fill="#1a1a1a" opacity="0.15"/>
  <rect x="630" y="180" width="130" height="420" fill="#1a1a1a" opacity="0.2"/>
  <!-- Windows -->
  <g fill="#fff" opacity="0.12">
    <rect x="80" y="240" width="20" height="25" rx="1"/>
    <rect x="115" y="240" width="20" height="25" rx="1"/>
    <rect x="80" y="290" width="20" height="25" rx="1"/>
    <rect x="115" y="290" width="20" height="25" rx="1"/>
    <rect x="340" y="200" width="25" height="30" rx="1"/>
    <rect x="390" y="200" width="25" height="30" rx="1"/>
    <rect x="340" y="260" width="25" height="30" rx="1"/>
    <rect x="390" y="260" width="25" height="30" rx="1"/>
    <rect x="660" y="220" width="20" height="28" rx="1"/>
    <rect x="700" y="220" width="20" height="28" rx="1"/>
    <rect x="660" y="275" width="20" height="28" rx="1"/>
    <rect x="700" y="275" width="20" height="28" rx="1"/>
  </g>
  <!-- Growth/renewal: plant emerging -->
  <g stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.5">
    <path d="M420 550 Q418 480 425 420 Q430 380 420 340"/>
    <path d="M425 420 Q450 400 460 380"/>
    <path d="M425 380 Q400 360 390 340"/>
  </g>
  <circle cx="420" cy="330" r="8" fill="#4ade80" opacity="0.4"/>
  <circle cx="460" cy="375" r="5" fill="#4ade80" opacity="0.3"/>
  <circle cx="390" cy="335" r="5" fill="#4ade80" opacity="0.3"/>
