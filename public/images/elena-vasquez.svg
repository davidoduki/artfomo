<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Surreal flora overtaking urban forms -->
  <rect x="300" y="200" width="200" height="350" fill="#1a1a1a" opacity="0.15" rx="2"/>
  <rect x="320" y="220" width="30" height="50" fill="#fff" opacity="0.1" rx="1"/>
  <rect x="370" y="220" width="30" height="50" fill="#fff" opacity="0.1" rx="1"/>
  <rect x="420" y="220" width="30" height="50" fill="#fff" opacity="0.1" rx="1"/>
  <!-- Flowing organic vines -->
  <g stroke="#fff" stroke-width="3" fill="none" opacity="0.35">
    <path d="M100 550 Q200 400 250 300 Q280 200 200 100"/>
    <path d="M250 300 Q300 280 350 320"/>
    <path d="M600 550 Q550 350 500 250 Q480 150 550 50"/>
    <path d="M500 250 Q460 230 420 260"/>
  </g>
  <!-- Neon flowers -->
  <circle cx="200" cy="100" r="30" fill="#f0fdf4" opacity="0.25"/>
  <circle cx="200" cy="100" r="15" fill="#fef08a" opacity="0.4"/>
  <circle cx="550" cy="50" r="25" fill="#f0fdf4" opacity="0.25"/>
  <circle cx="350" cy="320" r="20" fill="#fef08a" opacity="0.3"/>
  <circle cx="420" cy="260" r="18" fill="#f0fdf4" opacity="0.2"/>
  <!-- More flora bursts -->
  <circle cx="150" cy="350" r="40" fill="#86efac" opacity="0.15"/>
  <circle cx="650" cy="200" r="35" fill="#86efac" opacity="0.15"/>
  <circle cx="700" cy="450" r="50" fill="#86efac" opacity="0.1"/>
</svg>
