<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Woven textile pattern -->
  <g stroke="#fff" stroke-width="3" opacity="0.15">
    <!-- Horizontal weave -->
    <path d="M0 80 Q100 60 200 80 Q300 100 400 80 Q500 60 600 80 Q700 100 800 80"/>
    <path d="M0 160 Q100 140 200 160 Q300 180 400 160 Q500 140 600 160 Q700 180 800 160"/>
    <path d="M0 240 Q100 220 200 240 Q300 260 400 240 Q500 220 600 240 Q700 260 800 240"/>
    <path d="M0 320 Q100 300 200 320 Q300 340 400 320 Q500 300 600 320 Q700 340 800 320"/>
    <path d="M0 400 Q100 380 200 400 Q300 420 400 400 Q500 380 600 400 Q700 420 800 400"/>
    <path d="M0 480 Q100 460 200 480 Q300 500 400 480 Q500 460 600 480 Q700 500 800 480"/>
    <path d="M0 560 Q100 540 200 560 Q300 580 400 560 Q500 540 600 560 Q700 580 800 560"/>
  </g>
  <g stroke="#fff" stroke-width="3" opacity="0.12">
    <!-- Vertical weave -->
    <path d="M100 0 Q80 100 100 200 Q120 300 100 400 Q80 500 100 600"/>
    <path d="M200 0 Q220 100 200 200 Q180 300 200 400 Q220 500 200 600"/>
    <path d="M300 0 Q280 100 300 200 Q320 300 300 400 Q280 500 300 600"/>
    <path d="M400 0 Q420 100 400 200 Q380 300 400 400 Q420 500 400 600"/>
    <path d="M500 0 Q480 100 500 200 Q520 300 500 400 Q480 500 500 600"/>
    <path d="M600 0 Q620 100 600 200 Q580 300 600 400 Q620 500 600 600"/>
    <path d="M700 0 Q680 100 700 200 Q720 300 700 400 Q680 500 700 600"/>
  </g>
  <!-- Knot accents -->
  <g fill="#fff" opacity="0.1">
    <circle cx="200" cy="160" r="12"/>
    <circle cx="400" cy="320" r="12"/>
    <circle cx="600" cy="160" r="12"/>
    <circle cx="300" cy="400" r="12"/>
    <circle cx="500" cy="480" r="12"/>
  </g>
</svg>
