<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Light installation - radial light beams -->
  <circle cx="400" cy="300" r="250" fill="url(#glow)"/>
  <circle cx="400" cy="300" r="150" fill="url(#glow)"/>
  <circle cx="400" cy="300" r="80" fill="#fff" opacity="0.1"/>
  <!-- Concentric rings -->
  <g fill="none" stroke="#fff" opacity="0.15" stroke-width="1">
    <circle cx="400" cy="300" r="50"/>
    <circle cx="400" cy="300" r="100"/>
    <circle cx="400" cy="300" r="150"/>
    <circle cx="400" cy="300" r="200"/>
    <circle cx="400" cy="300" r="250"/>
    <circle cx="400" cy="300" r="300"/>
  </g>
  <!-- Light particles -->
  <g fill="#fff">
    <circle cx="350" cy="200" r="3" opacity="0.5"/>
    <circle cx="500" cy="180" r="2" opacity="0.4"/>
    <circle cx="280" cy="320" r="2.5" opacity="0.45"/>
    <circle cx="520" cy="350" r="3" opacity="0.5"/>
    <circle cx="400" cy="150" r="2" opacity="0.35"/>
    <circle cx="300" cy="420" r="2" opacity="0.4"/>
    <circle cx="480" cy="440" r="2.5" opacity="0.3"/>
    <circle cx="200" cy="250" r="1.5" opacity="0.3"/>
    <circle cx="600" cy="280" r="1.5" opacity="0.35"/>
    <circle cx="350" cy="400" r="2" opacity="0.4"/>
    <circle cx="450" cy="250" r="1.5" opacity="0.45"/>
    <circle cx="380" cy="350" r="2" opacity="0.5"/>
  </g>
  <!-- Light rays -->
  <g stroke="#fff" stroke-width="1" opacity="0.08">
    <line x1="400" y1="300" x2="100" y2="50"/>
    <line x1="400" y1="300" x2="700" y2="80"/>
    <line x1="400" y1="300" x2="750" y2="500"/>
    <line x1="400" y1="300" x2="50" y2="450"/>
    <line x1="400" y1="300" x2="400" y2="0"/>
    <line x1="400" y1="300" x2="800" y2="300"/>
    <line x1="400" y1="300" x2="0" y2="300"/>
    <line x1="400" y1="300" x2="400" y2="600"/>
  </g>
</svg>
