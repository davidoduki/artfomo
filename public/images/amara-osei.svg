<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Textile pattern inspired by West African kente cloth -->
  <g opacity="0.3" stroke="#fff" stroke-width="2" fill="none">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>
  <!-- Geometric shapes -->
  <rect x="40" y="120" width="100" height="60" fill="#fff" opacity="0.2" rx="4"/>
  <rect x="200" y="220" width="80" height="60" fill="#1a1a1a" opacity="0.15" rx="4"/>
  <polygon points="500,130 560,210 440,210" fill="#fff" opacity="0.2"/>
  <circle cx="680" cy="350" r="50" fill="#fff" opacity="0.15"/>
  <rect x="100" y="320" width="120" height="60" fill="#1a1a1a" opacity="0.1" rx="4"/>
  <polygon points="380,420 440,500 320,500" fill="#fff" opacity="0.15"/>
  <rect x="560" y="120" width="60" height="160" fill="#fff" opacity="0.12" rx="4"/>
  <circle cx="250" cy="460" r="40" fill="#fff" opacity="0.15"/>
  <rect x="620" y="440" width="140" height="80" fill="#1a1a1a" opacity="0.1" rx="4"/>
</svg>
